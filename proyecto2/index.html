<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="author" content="Luis A. Aguilar Bolaños, Pablo A. Alvarado Umaña">
  <meta name="description" content="GameVault - prototipo de tienda de videojuegos, Proyecto 2 EIF 506">
  <title>GameVault | Inicio</title>
  <link rel="icon" href="img/favicon.svg" type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/site.css">
</head>
<body data-page="inicio">
  <div id="gv-header"></div>

  <div class="container-fluid px-3 px-lg-4 py-4">
    <div class="row g-4">
      <div class="col-lg-3" id="gv-sidebar-wrap">
        <div id="gv-sidebar"></div>
      </div>
      <div class="col-lg-9">
        <section class="mb-4" aria-labelledby="destacados-title">
          <h1 id="destacados-title" class="h3 gv-section-title mb-3">Destacados y recomendados</h1>
          <div id="gv-home-carousel" class="carousel slide gv-carousel" data-bs-ride="carousel">
            <div class="carousel-inner"></div>
            <button class="carousel-control-prev" type="button" data-bs-target="#gv-home-carousel" data-bs-slide="prev">
              <span class="carousel-control-prev-icon" aria-hidden="true"></span>
              <span class="visually-hidden">Anterior</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#gv-home-carousel" data-bs-slide="next">
              <span class="carousel-control-next-icon" aria-hidden="true"></span>
              <span class="visually-hidden">Siguiente</span>
            </button>
          </div>
        </section>

        <section class="mb-4" aria-labelledby="rpg-title">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 id="rpg-title" class="h4 gv-section-title mb-0">RPG populares</h2>
            <a href="categoria.html?cat=3" class="btn btn-sm btn-outline-info">Ver categoría</a>
          </div>
          <div id="gv-rec-rpg"></div>
        </section>

        <section class="mb-4" aria-labelledby="accion-title">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 id="accion-title" class="h4 gv-section-title mb-0">Acción</h2>
            <a href="categoria.html?cat=1" class="btn btn-sm btn-outline-info">Explorar</a>
          </div>
          <div id="gv-rec-accion"></div>
        </section>

        <section aria-labelledby="indie-title">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 id="indie-title" class="h4 gv-section-title mb-0">Indie recomendados</h2>
            <a href="categoria.html?cat=11" class="btn btn-sm btn-outline-info">Ver más</a>
          </div>
          <div id="gv-rec-indie"></div>
        </section>
      </div>
    </div>
  </div>

  <div id="gv-footer"></div>
  <script src="js/catalog.js"></script>
  <script src="js/site.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
