<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="author" content="Luis A. Aguilar Bolaños, Pablo A. Alvarado Umaña">
  <title>GameVault | Carrito</title>
  <link rel="icon" href="img/favicon.svg" type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/site.css">
</head>
<body data-page="carrito" data-crumb="Carrito de compras">
  <div id="gv-header"></div>

  <div class="container-fluid px-3 px-lg-4 py-4">
    <div class="row g-4">
      <div class="col-lg-3"><div id="gv-sidebar"></div></div>
      <div class="col-lg-9">
        <h1 class="h3 gv-section-title mb-4">Carrito de compras</h1>
        <div class="table-responsive">
          <table class="table table-dark table-striped align-middle">
            <thead>
              <tr>
                <th>Producto</th>
                <th>Precio</th>
                <th>Cantidad</th>
                <th>Subtotal</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>
                  <div class="d-flex align-items-center gap-2">
                    <img src="https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1245620/capsule_616x353.jpg" width="96" height="55" alt="" class="rounded" style="object-fit:cover">
                    <div>
                      <a href="juego-elden-ring.html">Elden Ring</a>
                      <div class="small text-secondary">RPG · Juego base</div>
                    </div>
                  </div>
                </td>
                <td class="gv-price">$44.99</td>
                <td><input type="number" class="form-control form-control-sm" value="1" min="1" max="5" style="max-width:5rem" aria-label="Cantidad Elden Ring"></td>
                <td>$44.99</td>
              </tr>
              <tr>
                <td>
                  <div class="d-flex align-items-center gap-2">
                    <img src="https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1145360/capsule_616x353.jpg" width="96" height="55" alt="" class="rounded" style="object-fit:cover">
                    <div>
                      <a href="juego-hades.html">Hades</a>
                      <div class="small text-secondary">Indie · Juego base</div>
                    </div>
                  </div>
                </td>
                <td class="gv-price">$19.99</td>
                <td><input type="number" class="form-control form-control-sm" value="1" min="1" max="5" style="max-width:5rem" aria-label="Cantidad Hades"></td>
                <td>$19.99</td>
              </tr>
            </tbody>
            <tfoot>
              <tr>
                <th colspan="3" class="text-end">Total estimado</th>
                <th class="gv-price">$64.98</th>
              </tr>
            </tfoot>
          </table>
        </div>
        <div class="d-flex flex-wrap gap-2">
          <a href="categoria.html?cat=3" class="btn btn-outline-light">Seguir comprando</a>
          <a href="facturacion.html" class="btn btn-info">Proceder al pago</a>
        </div>
      </div>
    </div>
  </div>

  <div id="gv-footer"></div>
  <script src="js/catalog.js"></script>
  <script src="js/site.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
