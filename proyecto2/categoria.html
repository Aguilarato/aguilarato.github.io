<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="author" content="Luis A. Aguilar Bolaños, Pablo A. Alvarado Umaña">
  <title>GameVault | Categoría</title>
  <link rel="icon" href="img/favicon.svg" type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/site.css">
</head>
<body data-page="categoria">
  <div id="gv-header"></div>

  <div class="container-fluid px-3 px-lg-4 py-4">
    <div class="row g-4">
      <div class="col-lg-3"><div id="gv-sidebar"></div></div>
      <div class="col-lg-9">
        <header class="mb-4">
          <h1 id="gv-category-title" class="h3 gv-section-title">Categoría</h1>
          <p id="gv-category-desc" class="text-secondary"></p>
          <p class="small text-secondary mb-0">Explore el catálogo con paginación. Use la barra lateral para cambiar de sección.</p>
        </header>
        <div id="gv-product-grid"></div>
        <nav class="mt-4" aria-label="Paginación del catálogo">
          <ul class="pagination justify-content-center" id="gv-pagination"></ul>
        </nav>
      </div>
    </div>
  </div>

  <div id="gv-footer"></div>
  <script src="js/catalog.js"></script>
  <script src="js/site.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
